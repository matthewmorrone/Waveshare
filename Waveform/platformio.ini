[env:waveform_usb]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

upload_speed = 460800
monitor_speed = 115200

lib_extra_dirs = /Users/matthewmorrone/Documents/Arduino/libraries

lib_deps =
  bblanchon/ArduinoJson @ ^6.21.4
  lvgl/lvgl @ ^9.5.0
  https://github.com/moononournation/Arduino_GFX.git#v1.6.5

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_CONF_INCLUDE_SIMPLE
  -I include
  -I src

build_src_filter =
  +<*>
  -<tools/panel_diag.cpp>

[env:waveform_ota]
extends = env:waveform_usb
upload_protocol = espota
upload_port = waveform.local

[env:waveform_usb_bigapp]
extends = env:waveform_usb
board_build.partitions = config/partitions_waveform_bigapp_16MB.csv

[env:waveform_usb_diag]
extends = env:waveform_usb
build_flags =
  ${env:waveform_usb.build_flags}
  -DWAVEFORM_DIAG_DISPLAY=1

[env:waveform_usb_paneldiag]
extends = env:waveform_usb
build_src_filter =
  -<*>
  +<tools/panel_diag.cpp>
lib_deps =
  https://github.com/moononournation/Arduino_GFX.git#v1.6.5
