[platformio]
build_dir = /Users/matthewmorrone/Projects/Arduino/Waveshare/.pio-central/Locket/${PIOENV}
libdeps_dir = /Users/matthewmorrone/Projects/Arduino/Waveshare/.pio-central/libdeps
src_dir = ..
include_dir = Locket

[env:locket_usb]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

upload_speed = 460800
monitor_speed = 115200
upload_port = /dev/cu.usbmodem1101

lib_extra_dirs = /Users/matthewmorrone/Projects/Arduino/libraries

lib_deps =
  FS
  WiFi
  ArduinoOTA

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -I Locket
  -I /Users/matthewmorrone/.platformio/packages/framework-arduinoespressif32/libraries/FS/src
  -I /Users/matthewmorrone/.platformio/packages/framework-arduinoespressif32-libs/esp32s3/include/esp_wifi/include
  -I /Users/matthewmorrone/.platformio/packages/framework-arduinoespressif32-libs/esp32s3/include/esp_wifi/include/local

build_src_filter =
  +<Locket/locket.cpp>
  +<Locket/es8311.c>
  +<Locket/usb_msc.cpp>

[env:locket_ota]
extends = env:locket_usb
upload_protocol = espota
upload_port = locket.local
