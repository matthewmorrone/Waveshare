[platformio]
build_dir = /Users/matthewmorrone/Projects/Arduino/Waveshare/.pio-central/Launcher/${PIOENV}
libdeps_dir = /Users/matthewmorrone/Projects/Arduino/Waveshare/.pio-central/libdeps
src_dir = ..
include_dir = ../Shared

[env:usb]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.partitions = ../Shared/partitions_waveform_bigapp_16MB.csv

upload_speed = 460800
monitor_speed = 115200

lib_extra_dirs =
  /Users/matthewmorrone/Projects/Arduino/libraries

lib_deps =
  bblanchon/ArduinoJson @ ^6.21.4
  lvgl/lvgl @ ^9.5.0
  https://github.com/moononournation/Arduino_GFX.git#v1.6.5
  adafruit/Adafruit XCA9554 @ ^1.0.0
  XPowersLib
  SensorLib

build_unflags =
  -DARDUINO_USB_MODE
  -DARDUINO_USB_CDC_ON_BOOT

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -DLV_CONF_PATH=\"../Shared/lv_conf.h\"
  -DWAVEFORM_STANDALONE_PROFILE=1
  -DWAVEFORM_ENABLE_SCREEN_LAUNCHER=1
  -I ../Shared
  -I /Users/matthewmorrone/Projects/Arduino/libraries/Arduino_DriveBus/src

build_src_filter =
  +<Shared/main.cpp>
  +<Shared/screen_manager.cpp>
  +<Shared/battery.cpp>
  +<Shared/ble_manager.cpp>
  +<Shared/debug_monitor.cpp>
  +<Shared/imu_module.cpp>
  +<Shared/math_utils.cpp>
  +<Shared/ota_module.cpp>
  +<Shared/storage.cpp>
  +<Shared/wifi_manager.cpp>
  +<Shared/settings_state.cpp>
  +<Shared/es8311.c>
  +<Shared/calc_symbols_24.c>
  +<Shared/montserrat_bold_128.c>
  +<Shared/din_clock_76.c>
  +<Launcher/launcher.cpp>

[env:ota]
extends = env:usb
upload_protocol = espota
upload_port = waveform.local
