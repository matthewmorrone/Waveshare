[env:hardware_check_usb]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

upload_speed = 460800
monitor_speed = 115200

lib_extra_dirs = /Users/matthewmorrone/Documents/Arduino/libraries
lib_ldf_mode = deep+

lib_deps =
  FS
  Adafruit XCA9554
  GFX Library for Arduino
  SensorLib

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -I include
  -I /Users/matthewmorrone/.platformio/packages/framework-arduinoespressif32/libraries/FS/src
  -I /Users/matthewmorrone/.platformio/packages/framework-arduinoespressif32/libraries/Network/src
